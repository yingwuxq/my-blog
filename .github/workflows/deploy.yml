name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SITE_URL: https://yingwuxq.github.io/my-blog

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          ASTRO_BASE: /my-blog
      # Fix ALL paths for GitHub Pages sub-path
      - name: Fix asset paths
        run: |
          find dist -type f \
            \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.xml" -o -name "*.json" \) \
            -exec sed -i \
              -e 's|="/assets/|="/my-blog/assets/|g' \
              -e 's|="/_astro/|="/my-blog/_astro/|g' \
              -e 's|="/fonts/|="/my-blog/fonts/|g' \
              -e 's|="/avatars/|="/my-blog/avatars/|g' \
              -e 's|="/favicon|="/my-blog/favicon|g' \
              -e 's|="/robots|="/my-blog/robots|g' \
              -e 's|="/sitemap|="/my-blog/sitemap|g' \
              -e 's|="/rss|="/my-blog/rss|g' \
              -e 's|="/search-index|="/my-blog/search-index|g' \
              {} +
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
