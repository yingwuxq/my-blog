name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SITE_URL: https://yingwuxq.github.io/my-blog

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SITE_URL: https://yingwuxq.github.io/my-blog
      - name: Prefix all paths for GitHub Pages
        run: |
          # Fix HTML attribute values: ="/
          find dist -type f \( -name "*.html" -o -name "*.js" \) \
            -exec sed -i 's|="/\(my-blog/\)\?|="/my-blog/|g' {} +
          # Fix CSS: url(/xxx) and ="/
          find dist -type f -name "*.css" \
            -exec sed -i \
              -e 's|="/\(my-blog/\)\?|="/my-blog/|g' \
              -e 's|url(\(['"'"']\?\)/\(my-blog/\)\?|url(\1/my-blog/|g' \
              {} +
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
